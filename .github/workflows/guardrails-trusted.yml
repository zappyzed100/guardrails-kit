# guardrails-trusted.yml — base branch のコードだけで PR 側 workflow を検査する信頼の根
name: Guardrails Trusted

on:
  pull_request_target:

permissions:
  contents: read

jobs:
  workflow-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Third-party Actionはfull commit SHA固定（checkout v4 / setup-uv v5）。
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
      # PR head は checkout・実行せず、git show の入力データとしてだけ取得する。
      # CI全体をbyte固定するため、言語別jobを `run: true` にする改変も通らない。
      - run: git fetch --no-tags origin "+refs/pull/${{ github.event.pull_request.number }}/head:refs/remotes/pull/${{ github.event.pull_request.number }}/head"
      - run: uv run scripts/check_workflow_integrity.py --base "${{ github.event.pull_request.base.sha }}" --head "refs/remotes/pull/${{ github.event.pull_request.number }}/head"
